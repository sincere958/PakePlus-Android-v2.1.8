<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本拼接工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            transform: translateY(25%);
            padding-bottom: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #4a90d9;
        }

        .preset-section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #4a90d9;
            color: white;
        }

        .btn-primary:hover {
            background-color: #3a7bc8;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-success {
            background-color: #28a745;
            color: white;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        .btn-success:active {
            transform: scale(0.98);
        }

        .output-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .output-result {
            min-height: 100px;
            margin-top: 10px;
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background-color: #d4edda;
            color: #155724;
        }

        .status.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 文本拼接工具</h1>
        
        <div class="input-group">
            <label for="copiedText">店铺名称/产品信息：</label>
            <input type="text" id="copiedText" placeholder="直接输入店铺名称..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-top: 8px;">
            <div style="margin-top: 10px;">
                <button class="btn-primary" onclick="clearShopName()" style="padding: 12px 24px; font-size: 16px; background-color: #dc3545; width: 100%;">🗑️ 清空店铺名称</button>
                <button class="btn-primary" onclick="joinAndCopy()" style="padding: 12px 24px; font-size: 16px; background-color: #4a90d9; width: 100%; margin-top: 10px;">📋 拼接并复制</button>
            </div>
        </div>

        <div class="preset-section">
            <label for="presetText">预设文字内容（将在下一行）：</label>
            <textarea id="presetText" placeholder="在此设置您的预设文字..."></textarea>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        const copiedText = document.getElementById('copiedText');
        const presetText = document.getElementById('presetText');
        const result = document.getElementById('result');
        const status = document.getElementById('status');

        function loadSettings() {
            const savedPreset = localStorage.getItem('presetText');
            if (savedPreset) {
                presetText.value = savedPreset;
            }
        }

        function saveSettings() {
            localStorage.setItem('presetText', presetText.value);
        }

        presetText.addEventListener('input', saveSettings);

        async function checkClipboard() {
            try {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    const text = await navigator.clipboard.readText();
                    if (text && !copiedText.value) {
                        copiedText.value = text;
                        showStatus('已自动读取剪贴板内容', 'success');
                    }
                } else if (window.clipboardData) {
                    const text = window.clipboardData.getData('text');
                    if (text && !copiedText.value) {
                        copiedText.value = text;
                    }
                }
            } catch (err) {
                console.log('无法自动读取剪贴板');
            }
        }

        async function quickPaste() {
            try {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    const text = await navigator.clipboard.readText();
                    if (text) {
                        copiedText.value = text;
                        showStatus('已粘贴剪贴板内容', 'success');
                    } else {
                        showStatus('剪贴板为空', 'error');
                    }
                } else if (window.clipboardData) {
                    const text = window.clipboardData.getData('text');
                    if (text) {
                        copiedText.value = text;
                        showStatus('已粘贴剪贴板内容', 'success');
                    } else {
                        showStatus('剪贴板为空', 'error');
                    }
                } else {
                    showStatus('浏览器不支持', 'error');
                }
            } catch (err) {
                showStatus('点击按钮粘贴失败，请手动输入', 'error');
            }
        }

        function copyPresetText() {
            const presetTextContent = "可以先屯着，用不到过期也会自动退的，宝子们";
            try {
                if (window.clipboardData) {
                    window.clipboardData.setData('text', presetTextContent);
                } else {
                    const tempInput = document.createElement('textarea');
                    tempInput.value = presetTextContent;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                }
                showStatus('✅ 已复制第二页文案', 'success');
            } catch (err) {
                showStatus('复制失败，请手动复制', 'error');
            }
        }

        function clearShopName() {
            copiedText.value = '';
            showStatus('已清空店铺名称', 'success');
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
            setTimeout(() => {
                status.className = 'status';
            }, 3000);
        }

        function joinAndCopy() {
            const shopName = copiedText.value.trim();
            const preset = presetText.value.trim();

            if (!shopName && !preset) {
                showStatus('请至少输入一段文本', 'error');
                return;
            }

            if (!shopName) {
                showStatus('请输入店铺名称', 'error');
                return;
            }

            const presetTextContent = "可以先屯着，用不到过期也会自动退的，宝子们";     
            
            try {
                if (window.clipboardData) {
                    window.clipboardData.setData('text', presetTextContent);
                } else {
                    const tempInput = document.createElement('textarea');
                    tempInput.value = presetTextContent;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                }
            } catch (err) {
                showStatus('复制失败，请手动复制', 'error');
            }
            
            setTimeout(() => {
                try {
                    const joinedText = shopName + '\n' + preset;
                    if (window.clipboardData) {
                        window.clipboardData.setData('text', joinedText);
                    } else {
                        const tempInput2 = document.createElement('textarea');
                        tempInput2.value = joinedText;
                        document.body.appendChild(tempInput2);
                        tempInput2.select();
                        document.execCommand('copy');
                        document.body.removeChild(tempInput2);
                    }
                    showStatus('✅ 已复制第二页文案并拼接复制成功！', 'success');
                    
                    setTimeout(() => {
                        window.open('snssdk1128://', '_blank');
                    }, 300);
                } catch (err) {
                    showStatus('复制失败，请手动复制', 'error');
                }
            }, 120);
        }

        checkClipboard();
        loadSettings();
    </script>
</body>
</html>
